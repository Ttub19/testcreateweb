{% extends 'menu.html' %}

{% block content %}
<div class="card max-w-lg mx-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-amber-600">แก้ไขข้อมูลสินค้า</h2>
        <a href="{% url 'list' %}" class="text-sm font-medium text-gray-500 hover:text-gray-700">&larr; ยกเลิก</a>
    </div>
    
    <form method="POST" class="space-y-4">
        {% csrf_token %}
        
        <div>
            <label for="brand" class="block text-sm font-medium text-gray-700">Brand</label>
            <input type="text" id="brand" name="brand" value="{{ product.brand }}" required 
                   class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
        </div>

        <div>
            <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" id="name" name="name" value="{{ product.name }}" required 
                   class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label for="price" class="block text-sm font-medium text-gray-700">Price</label>
                <input type="number" step="0.01" id="price" name="price" value="{{ product.price }}" required 
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
            </div>

            <div>
                <label for="stock" class="block text-sm font-medium text-gray-700">Stock</label>
                <input type="number" id="stock" name="stock" value="{{ product.stock }}" required 
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
            </div>
        </div>

        <div class="pt-2 flex space-x-3">
            <button type="submit" 
                    class="w-full inline-flex justify-center rounded-md border border-transparent bg-amber-600 py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-amber-700 focus:outline-none focus:ring-2 focus:ring-amber-500">
                บันทึกการเปลี่ยนแปลง
            </button>
        </div>
    </form>
</div>
{% endblock %}
